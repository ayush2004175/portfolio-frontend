<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCA student Portfolio</title>
    <!-- Linking our CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Essential Meta Tags for SEO -->
    <meta name="description" content="Portfolio of AYUSH, a Full-Stack Software Engineer specializing in Java and dynamic web interfaces.">
    
    <!-- Open Graph Tags for Social Media / LinkedIn Previews -->
    <meta property="og:title" content="AYUSH | Software Engineer">
    <meta property="og:description" content="View my technical projects and full-stack development portfolio.">
    <meta property="og:image" content="assets/portfolio-preview.jpg"> <!-- You'll need to save a screenshot of your site here -->
    <meta property="og:url" content="https://www.yourdomain.com">
    <meta property="og:type" content="website">
</head>
<body>

    <!-- NAVIGATION BAR -->
    <header class="navbar">
        <div class="logo">Portfolio</div>
        <nav>
            <ul class="nav-links">
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- HERO SECTION (First thing users see) -->
    <section id="hero" class="hero-section">
        <div class="hero-content">
            <h1>Hello, I'm <span class="highlight">AYUSH</span>.</h1>
            <p>A Full-Stack Developer specializing in robust Java backends and dynamic web interfaces.</p>
            <a href="#projects" class="btn primary-btn">View My Work</a>
        </div>
    </section>

    <!-- PROJECTS SECTION -->
    <section id="projects" class="projects-section">
        <h2>Featured Projects</h2>
        <div class="project-grid" id="project-container">
            <!-- Projects will be injected here dynamically by JavaScript later -->
        </div>
    </section>

    <!-- CONTACT SECTION -->
    <section id="contact" class="contact-section">
        <h2>Let's Connect</h2>
        <form id="contact-form">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <textarea id="message" rows="5" placeholder="Your Message" required></textarea>
            <button type="submit" class="btn submit-btn">Send Message</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 AYUSH. Engineered from scratch.</p>
    </footer>

    <!-- Linking our JavaScript -->
    <script src="js/app.js"></script>
</body>
</html>
